services:
  stats-server:
    build: ./ewm-stats-service/stats-service-app
    ports:
      - "9090:9090"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://stats-db:5432/stats_db
      SPRING_DATASOURCE_USERNAME: dbuser
      SPRING_DATASOURCE_PASSWORD: 12345
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      stats-db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9090/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - app-network

  stats-db:
    image: postgres:16.1
    container_name: stats-db
    hostname: stats-db
    ports:
      - "5432:5432"
    #volumes:
     # - ./volumes/postgres-stats:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: stats_db
      POSTGRES_USER: dbuser
      POSTGRES_PASSWORD: 12345
    healthcheck:
      test: pg_isready -q -d "$$POSTGRES_DB" -U "$$POSTGRES_USER"
      timeout: 5s
      interval: 5s
      retries: 10
    networks:
      - app-network

  ewm-service:
    build: ./ewm-main-service/main-service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://ewm-db:5432/ewm_db
      SPRING_DATASOURCE_USERNAME: dbuser
      SPRING_DATASOURCE_PASSWORD: 12345
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      STATS_SERVER_URL: http://stats-server:9090
    depends_on:
      ewm-db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - app-network

  ewm-db:
    image: postgres:16.1
    container_name: ewm-db
    hostname: ewm-db
    environment:
      POSTGRES_DB: ewm_db
      POSTGRES_USER: dbuser
      POSTGRES_PASSWORD: 12345
    ports:
      - "5431:5432"
    healthcheck:
      test: pg_isready -q -d "$$POSTGRES_DB" -U "$$POSTGRES_USER"
      timeout: 5s
      interval: 5s
      retries: 10
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-stats:
  postgres-main:

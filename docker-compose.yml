services:
  stats-server:
    build: ./stats/stats-server
    ports:
      - "9090:9090"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://stats-db:5432/statsdb
      SPRING_DATASOURCE_USERNAME: statsuser
      SPRING_DATASOURCE_PASSWORD: statspass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - stats-db
    networks:
      - app-network

  stats-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: statsdb
      POSTGRES_USER: statsuser
      POSTGRES_PASSWORD: statspass
    ports:
      - "5433:5432"
    networks:
      - app-network

  ewm-service:
    build: ./main-service
    ports:
      - "8080:8080"
    networks:
      - app-network
    # depends_on:  # Раскомментируйте, если ewm-service зависит от ewm-db
    #   - ewm-db

  ewm-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: ewmdb
      POSTGRES_USER: ewmuser
      POSTGRES_PASSWORD: ewmpass
    networks:
      - app-network

volumes:
  postgres_data_stats:

networks:
  app-network:
    driver: bridge

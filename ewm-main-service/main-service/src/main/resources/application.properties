server.port=8080

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always

# ????? ?????????
spring.main.allow-bean-definition-overriding=false

# --- ???????? ??????? (?? ?????????) ---
%default.spring.datasource.driver-class-name=org.postgresql.Driver
%default.spring.datasource.url=jdbc:postgresql://localhost:5432/main_db
%default.spring.datasource.username=dbuser
%default.spring.datasource.password=12345

# --- ???????? ??????? ---
%test.spring.datasource.driver-class-name=org.h2.Driver
%test.spring.datasource.url=jdbc:h2:mem:main_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
%test.spring.datasource.username=dbuser
%test.spring.datasource.password=
spring.h2.console.enabled=true
